  - name: Malloc lab
    slug: malloc
    description: 동적 메모리 할당자 구현. 할당 정책과 단편화 분석.
    children:
      - name: implicit
        description: Implicit Free List 기반 할당자.
      - name: explicit
        description: Explicit Free List 기반 할당자.
      - name: seglist
        description: Segregated Free List 기반 할당자.
      - name: buddy system
        description: Buddy System 할당자.
      - name: Fragmentation
        description: Internal·External 단편화의 원인과 완화 기법.
        sub:
          - Internal Fragmentation
          - External Fragmentation
      - name: 동적 메모리 할당
        description: 힙 영역에서 sbrk·malloc·free·realloc 로 이뤄지는 메모리 할당 흐름.
        sub:
          - name: 힙
            slug: heap
            description: 프로세스 힙 영역의 구조·확장 방식.
          - name: sbrk
            slug: sbrk
            description: sbrk 시스템콜과 힙 끝 포인터 이동.
          - name: brk
            slug: brk
            description: brk 시스템콜 원리와 sbrk 와의 관계.
          - name: malloc
            slug: malloc
            description: malloc 호출 흐름과 구현 전략.
          - name: free
            slug: free
            description: free 호출 흐름과 메타데이터 복원.
          - name: realloc
            slug: realloc
            description: realloc 의 제자리 확장·재할당 규칙.
          - name: heap allocator 내부 구조
            slug: allocator-internals
            description: 헤더·푸터·가용 리스트·정렬 정책 등 할당자 내부 자료구조.
          - name: 헤더 하위 3비트 트릭
            slug: header-3bit-trick
            description: 8바이트 정렬 전제로 하위 3비트를 메타로 쓰는 기법.
          - name: split 과 coalesce
            slug: split-coalesce
            description: 블록 분할·인접 가용 블록 병합 정책.
      - name: 할당 정책
        description: 가용 블록 중 어떤 블록을 고를지 결정하는 탐색 전략.
        sub:
          - first fit
          - next fit
          - best fit
      - name: Coalescing
        description: 해제된 인접 가용 블록을 병합해 외부 단편화를 줄이는 기법.
        sub:
          - 경계 태그
          - 즉시 병합
          - 지연 병합
      - name: 성능 지표
        description: 할당자 성능 평가 지표. Malloc lab 점수 산정에 사용.
        sub:
          - 메모리 이용률 util
          - 처리량 thru
          - 테스트 스크립트

