# 학습 키워드 트리 - 단일 진실 소스 (SSOT)
# 이 파일을 편집한 뒤 `make scaffold` 를 실행하면 폴더·README 가 동기화된다.
# 상세 규약은 docs/CONTRIBUTING.md 참조.

categories:
  - name: CS 기초
    slug: cs
    description: 컴퓨터 과학의 기초 개념. 하드웨어 비트 폭, 수 표현, 메모리 모델, 언어별 평가 방식, 파일 포맷.
    children:
      - name: 32 Bit 64 Bit 차이
        description: 32비트와 64비트 시스템의 레지스터·주소공간·성능 차이.
      - name: Python Call by value Call by reference
        description: 파이썬의 객체 전달 방식. 가변·불변 객체에 따른 동작 차이.
      - name: 실수 표현법
        description: 컴퓨터에서 실수를 표현하는 방식.
        sub:
          - 부동 소수점
          - 고정 소수점
      - name: C에서 Pointer 및 배열
        description: C 포인터의 의미, 배열과의 관계, 포인터 연산.
      - name: Garbage Collect
        description: 자동 메모리 회수 기법. 언어별 GC 전략 비교.
      - name: Stack과 Heap 메모리 구조
        description: 프로세스 메모리의 스택·힙 영역과 그 특성.
      - name: jpg png gif 차이
        description: 대표 이미지 포맷의 압축 방식·색상 특성·사용처 비교.
      - name: 2의 보수 1의 보수
        description: 음수 표현 방식 두 가지의 원리와 비교.
      - name: CPU vs GPU
        description: 범용 처리기와 병렬 처리기의 구조적 차이.
      - name: SSD HDD
        description: 두 저장 장치의 동작 원리와 성능·수명 특성.
      - name: C 언어 기초
        description: C 언어의 변수·함수·구조체·포인터와 컴파일·디버깅·make 사용법.
        sub:
          - 변수와 타입
          - 함수와 매개변수
          - 구조체
          - 포인터
          - 컴파일과 링크
          - make 빌드
          - gdb 디버깅

  - name: Algorithm 및 Data Structures
    slug: algo
    description: 자료구조와 알고리즘 전반. 시간복잡도부터 트리·그래프·정렬·해시·DP·Greedy.
    children:
      - name: 시간 복잡도
        description: 알고리즘의 점근 복잡도 분석. Big-Oh 표기법 중심.
      - name: Recursion Iteration
        description: 재귀와 반복의 관계·트레이드오프·변환.
        sub:
          - 팩토리얼
          - 피보나치
          - 하노이 탑
      - name: Linked List
        description: 연결 리스트의 종류와 구현·시간복잡도.
      - name: Array
        description: 배열의 메모리 레이아웃·접근 비용·정적·동적 배열.
      - name: Stack
        description: LIFO 자료구조. 배열·연결 리스트 기반 구현.
      - name: Queue
        description: FIFO 자료구조. 배열·연결 리스트·원형 큐·덱.
      - name: Deep Copy vs Shallow Copy
        description: 얕은 복사와 깊은 복사의 차이와 주의점.
      - name: 정렬
        description: 대표 정렬 알고리즘의 원리·복잡도·안정성.
        sub:
          - 버블 정렬
          - 삽입 정렬
          - QuickSort
          - MergeSort
          - HeapSort
      - name: Hash Table
        description: 해시 자료구조와 충돌 처리·리해싱 전략.
        sub:
          - collision
          - chaining
          - rehashing
      - name: DFS
        description: 깊이 우선 탐색의 원리와 응용.
      - name: BFS
        description: 너비 우선 탐색의 원리와 응용.
      - name: Graph
        description: 그래프의 표현 방식·탐색·경로 알고리즘.
        sub:
          - 인접 리스트
          - 인접 행렬
          - 연결 요소
          - 위상정렬
      - name: Tree
        description: 트리 자료구조와 순회·탐색.
        sub:
          - 이진 트리
          - 이진 탐색 트리 BST
          - 트리 순회
      - name: Dynamic Programming
        description: 최적 부분 구조와 중복 부분 문제를 활용한 설계 기법.
        sub:
          - Top-down 메모이제이션
          - Bottom-up 타뷸레이션
          - LCS
          - 0 1 배낭
          - LIS
          - 편집거리
          - 최장 회문 부분문자열
      - name: Greedy Algorithm
        description: 매 단계 국소 최적을 선택하는 설계 기법.
        sub:
          - 활동 선택
          - 회의실 배정
          - 멀티탭 스케줄링
          - 동전 거스름돈
      - name: 균형 이진 트리 Balanced BST
        description: 균형을 유지하는 이진 탐색 트리 계열.
        sub:
          - AVL
          - RBTree
      - name: 문자열
        description: 문자열 처리 기법. 회문·반복·치환·기본 패턴 매칭.
        sub:
          - 회문 Palindrome
          - 문자열 반복
          - 패턴 매칭 기초
      - name: 완전탐색
        description: 가능한 모든 경우를 탐색하는 기법. 가지치기 없는 전수조사 기준.
      - name: 백트래킹
        description: 조건 위배 시 되돌아가며 탐색 공간을 가지치기하는 설계 기법.
        sub:
          - 조합 생성
          - 순열 생성
          - N-Queen 패턴
          - 가지치기
      - name: 정수론
        description: 알고리즘에서 자주 만나는 수론적 주제.
        sub:
          - 최대공약수 GCD
          - 최소공배수 LCM
          - 소수 판정
          - 에라토스테네스의 체
          - 골드바흐의 추측
      - name: 이분탐색
        description: 정렬된 공간에서 탐색 범위를 절반씩 좁히는 기법.
        sub:
          - lower_bound
          - upper_bound
          - 파라메트릭 서치
      - name: 분할정복
        description: 문제를 부분 문제로 나눠 해결하고 합치는 설계 기법.
        sub:
          - 점화식
          - Master Theorem
      - name: Heap 우선순위 큐
        description: 힙 자료구조와 우선순위 큐의 구현·활용.
        sub:
          - Min-Heap
          - Max-Heap
          - heapify
          - 삽입과 삭제
      - name: Trie
        description: 접두사 트리. 문자열 집합의 검색·저장에 특화된 자료구조.
        sub:
          - 삽입
          - 검색
          - 접두사 탐색

  - name: Malloc lab
    slug: malloc
    description: 동적 메모리 할당자 구현. 할당 정책과 단편화 분석.
    children:
      - name: implicit
        description: Implicit Free List 기반 할당자.
      - name: explicit
        description: Explicit Free List 기반 할당자.
      - name: seglist
        description: Segregated Free List 기반 할당자.
      - name: buddy system
        description: Buddy System 할당자.
      - name: Fragmentation
        description: Internal·External 단편화의 원인과 완화 기법.
        sub:
          - Internal Fragmentation
          - External Fragmentation
      - name: 동적 메모리 할당
        description: 힙 영역에서 sbrk·malloc·free·realloc 로 이뤄지는 메모리 할당 흐름.
        sub:
          - 힙
          - sbrk
          - brk
          - malloc
          - free
          - realloc
      - name: 할당 정책
        description: 가용 블록 중 어떤 블록을 고를지 결정하는 탐색 전략.
        sub:
          - first fit
          - next fit
          - best fit
      - name: Coalescing
        description: 해제된 인접 가용 블록을 병합해 외부 단편화를 줄이는 기법.
        sub:
          - 경계 태그
          - 즉시 병합
          - 지연 병합
      - name: 성능 지표
        description: 할당자 성능 평가 지표. Malloc lab 점수 산정에 사용.
        sub:
          - 메모리 이용률 util
          - 처리량 thru

