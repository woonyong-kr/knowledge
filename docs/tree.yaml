          - 고정 소수점
      - name: C에서 Pointer 및 배열
        slug: c-pointer
        description: C 포인터의 의미·배열 관계·포인터 연산·메타데이터 부재로 생기는 메모리 버그.
        sub:
          - 포인터 기본
