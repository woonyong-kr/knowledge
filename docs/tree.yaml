  - name: DB
    slug: db
    description: 관계형/비관계형 DB, 인덱스, 트리 기반 구조.
    children:
      - name: 관계형 DB와 No-SQL DB
        description: 두 계열의 모델·쿼리·확장성 비교.
      - name: DB Index
        description: 인덱스의 목적과 종류·비용.
      - name: B Tree B+ Tree
        description: 두 트리 구조의 원리와 DB 인덱스에서의 사용.

