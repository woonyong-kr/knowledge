# 학습 키워드 트리 - 단일 진실 소스 (SSOT)
# 이 파일을 편집한 뒤 `make scaffold` 를 실행하면 폴더·README 가 동기화된다.
# 상세 규약은 docs/CONTRIBUTING.md 참조.

categories:
  - name: CS 기초
    slug: cs
    description: 컴퓨터 과학의 기초 개념. 하드웨어 비트 폭, 수 표현, 메모리 모델, 언어별 평가 방식, 파일 포맷.
    children:
      - name: 32 Bit 64 Bit 차이
        description: 32비트와 64비트 시스템의 레지스터·주소공간·성능 차이.
      - name: Python Call by value Call by reference
        description: 파이썬의 객체 전달 방식. 가변·불변 객체에 따른 동작 차이.
      - name: 실수 표현법
        description: 컴퓨터에서 실수를 표현하는 방식.
        sub:
          - 부동 소수점
          - 고정 소수점
      - name: C에서 Pointer 및 배열
        description: C 포인터의 의미, 배열과의 관계, 포인터 연산.
      - name: Garbage Collect
        description: 자동 메모리 회수 기법. 언어별 GC 전략 비교.
      - name: Stack과 Heap 메모리 구조
        description: 프로세스 메모리의 스택·힙 영역과 그 특성.
      - name: jpg png gif 차이
        description: 대표 이미지 포맷의 압축 방식·색상 특성·사용처 비교.
      - name: 2의 보수 1의 보수
        description: 음수 표현 방식 두 가지의 원리와 비교.
      - name: CPU vs GPU
        description: 범용 처리기와 병렬 처리기의 구조적 차이.
      - name: SSD HDD
        description: 두 저장 장치의 동작 원리와 성능·수명 특성.

  - name: Algorithm 및 Data Structures
    slug: algo
    description: 자료구조와 알고리즘 전반. 시간복잡도부터 트리·그래프·정렬·해시·DP·Greedy.
    children:
      - name: 시간 복잡도
        description: 알고리즘의 점근 복잡도 분석. Big-Oh 표기법 중심.
      - name: Recursion Iteration
        description: 재귀와 반복의 관계·트레이드오프·변환.
      - name: Linked List
        description: 연결 리스트의 종류와 구현·시간복잡도.
      - name: Array
        description: 배열의 메모리 레이아웃·접근 비용·정적·동적 배열.
      - name: Stack
        description: LIFO 자료구조. 배열·연결 리스트 기반 구현.
      - name: Queue
        description: FIFO 자료구조. 배열·연결 리스트·원형 큐·덱.
      - name: Deep Copy vs Shallow Copy
        description: 얕은 복사와 깊은 복사의 차이와 주의점.
      - name: 정렬
        description: 대표 정렬 알고리즘의 원리·복잡도·안정성.
        sub:
          - QuickSort
          - MergeSort
          - HeapSort
      - name: Hash Table
        description: 해시 자료구조와 충돌 처리·리해싱 전략.
        sub:
          - collision
          - chaining
          - rehashing
      - name: DFS
        description: 깊이 우선 탐색의 원리와 응용.
      - name: BFS
        description: 너비 우선 탐색의 원리와 응용.
      - name: Graph
        description: 그래프의 표현 방식·탐색·경로 알고리즘.
      - name: Tree
        description: 트리 자료구조와 순회·탐색.
      - name: Dynamic Programming
        description: 최적 부분 구조와 중복 부분 문제를 활용한 설계 기법.
      - name: Greedy Algorithm
        description: 매 단계 국소 최적을 선택하는 설계 기법.
      - name: 균형 이진 트리 Balanced BST
        description: 균형을 유지하는 이진 탐색 트리 계열.
        sub:
          - AVL
          - RBTree

  - name: Malloc lab
    slug: malloc
    description: 동적 메모리 할당자 구현. 할당 정책과 단편화 분석.
    children:
      - name: implicit
        description: Implicit Free List 기반 할당자.
      - name: explicit
        description: Explicit Free List 기반 할당자.
      - name: seglist
        description: Segregated Free List 기반 할당자.
      - name: buddy system
        description: Buddy System 할당자.
      - name: Fragmentation
        description: Internal·External 단편화의 원인과 완화 기법.

  - name: 네트워크
    slug: net
    description: OSI 계층, 프로토콜, 소켓 프로그래밍, 프록시·CDN, REST API.
    children:
      - name: BSD 소켓
        description: BSD 소켓 API 와 기본 시스템콜.
      - name: 프록시 서버
        description: Forward·Reverse 프록시의 역할과 구성.
      - name: TCP IP UDP HTTP file descriptor DNS
        description: 핵심 네트워크 프로토콜과 파일 디스크립터·DNS 개요.
      - name: REST API
        description: REST 아키텍처 스타일과 설계 원칙.
      - name: HTTP METHOD
        description: GET·POST·PUT·PATCH·DELETE 메서드의 의미와 사용법.
      - name: OSI 7계층
        description: OSI 참조 모델의 각 계층과 역할.
      - name: CDN
        description: 콘텐츠 전송 네트워크의 원리와 캐싱 전략.

  - name: OS
    slug: os
    description: 운영체제 핵심 개념. 프로세스·스레드, 스케줄링, 동기화, 가상 메모리, 캐시.
    children:
      - name: OS의 정의
        description: 운영체제의 목적과 역할.
      - name: Process와 Thread
        description: 프로세스와 스레드의 구조·차이·비용.
      - name: CPU Scheduling 알고리즘
        description: FCFS·SJF·RR·Priority·MLFQS 스케줄링 정책.
      - name: Semaphore와 Mutex
        description: 두 대표 동기화 프리미티브의 의미와 차이.
      - name: Race Condition
        description: 공유 자원 경쟁 상태의 원인과 예시.
      - name: Deadlock
        description: 교착 상태의 조건·탐지·회피·예방.
      - name: Context Switching
        description: 문맥 교환의 동작 원리와 비용.
      - name: System Call
        description: 사용자 모드에서 커널 기능을 요청하는 메커니즘.
      - name: Kernel
        description: 커널의 역할과 구조·모놀리식 vs 마이크로.
      - name: Atomic Operation
        description: 원자적 연산의 의미와 하드웨어 지원.
      - name: Interrupt
        description: 인터럽트의 종류와 처리 흐름.
      - name: 가상 메모리
        description: 가상 주소 공간과 물리 메모리 매핑.
      - name: 페이징 기법
        description: 페이지 단위 메모리 관리와 페이지 테이블.
      - name: Cache
        description: 캐시 계층 구조와 지역성 원리.
      - name: TLB
        description: 주소 변환 캐시의 동작.
      - name: Page Fault
        description: 페이지 부재의 원인과 처리 과정.
      - name: linux redirection pipe
        description: 리눅스 셸의 리다이렉션과 파이프 동작.

  - name: Pintos
    slug: pintos
    description: PintOS 프로젝트 0~4. 가상화·스레드·사용자 프로그램·가상 메모리·파일 시스템.
    children:
      - name: Project 0 PintOS
        description: 프로젝트 환경 설정과 자주 만나는 버그 패턴.
        sub:
          - Virtual Machine Hypervisor
          - qemu
          - qemu Common bugs
          - Memory leak
          - Race condition
          - Deadlock
          - Use after free
      - name: Project 1 Threads
        description: Time-sharing, 스케줄러, 동기화 프리미티브 구현.
        sub:
          - Time-sharing system
          - Context Switching
          - Scheduler
          - Round Robin
          - Priority
          - Priority donation
          - MLFQS
          - 4BSD
          - nice
          - Thread
          - Thread control block
          - Timer Interrupt
          - Timer sleep
          - Synchronization
          - Semaphore
          - lock
          - condvar
      - name: Project 2 User Programs
        description: 유저/커널 모드, 프로세스, 시스템콜, ELF 로더.
        sub:
          - User mode vs Kernel mode
          - Process
          - Process Environment block
          - Process identifier
          - User Stack
          - x86_64 calling convention
          - Register vs Memory
          - argument vector
          - ELF loader
          - system call
          - filesys syscall
          - process syscall
          - file descriptor
          - file descriptor table
          - dup2 syscall
      - name: Project 3 Virtual Memory
        description: 가상 메모리 관리, 페이지 타입, 스왑, COW.
        sub:
          - Virtual memory management
          - paging
          - virtual page
          - physical frame
          - page table
          - supplementary page table
          - MMU
          - TLB
          - Uninitialized page
          - Lazy initialization
          - Anonymous page
          - stack growth
          - file-backed page
          - mmap syscall
          - Swap in out
          - page replacement policy
          - swap disk
          - Copy on Write
      - name: Project 4 File System
        description: 파일 시스템 구성 요소와 구현, 저널링.
        sub:
          - FAT
          - Berkley FFS
          - EXT
          - file
          - extensible file
          - directory
          - working directory
          - hard link vs soft link
          - sector cluster
          - super block
          - disk inode
          - in-memory inode
          - open inode table
          - Buffer cache
          - filesystem mount
          - Journaling

